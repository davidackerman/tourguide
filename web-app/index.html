<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tourguide</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">tourguide</div>
        <div class="dataset-picker">
          <label for="dataset-select">Dataset:</label>
          <select id="dataset-select" disabled>
            <option>Loading…</option>
          </select>
          <button id="load-data-btn" class="btn-secondary">+ Load your data</button>
          <button id="analyze-btn" class="btn-secondary" title="Compute per-object stats on a zarr segmentation (browser-side)">∑ Analyze</button>
          <button id="custom-btn" class="btn-secondary" title="Run arbitrary Python on one or more layers (with Gemini-assist)">🐍 Custom</button>
          <button id="settings-btn" class="btn-secondary" title="Settings (AI, analysis backend)">⚙ Settings</button>
          <button id="share-btn" class="btn-secondary" title="Copy shareable link">🔗 Share</button>
          <span id="backend-indicator" class="backend-indicator">No AI</span>
        </div>
      </header>
      <main>
        <section id="viewer">
          <div id="ng-host" class="ng-host"></div>
        </section>
        <aside id="sidebar">
          <div id="query-host"></div>
          <div id="dataset-meta" class="placeholder">
            Pick a dataset to begin.
          </div>
          <div id="browser-host"></div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
