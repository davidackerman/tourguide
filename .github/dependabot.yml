version: 2
updates:
  # Keep Neuroglancer (and the rest of the web-app's npm deps) auto-bumped.
  # Neuroglancer ships frequently; Dependabot opens PRs when new versions exist
  # so the web viewer can stay current upstream without manual `npm update`.
  - package-ecosystem: "npm"
    directory: "/web-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      neuroglancer:
        patterns:
          - "neuroglancer"
      dev-deps:
        dependency-type: "development"
      runtime-deps:
        dependency-type: "production"
        exclude-patterns:
          - "neuroglancer"
    commit-message:
      prefix: "deps(web-app)"
      include: "scope"
    labels:
      - "dependencies"
      - "web-app"

  # GitHub Actions versions used by the deploy workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
